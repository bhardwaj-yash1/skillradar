version: "3.9"

services:
  backend:
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    command: >
      sh -c "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    volumes:
      - ./frontend:/app
    environment:
      STREAMLIT_SERVER_RUN_ON_SAVE: "true"
